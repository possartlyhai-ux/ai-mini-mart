<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Ai Mini-Mart — Staff</title>
  <link rel="icon" type="image/png" href="/assets/logo.png" />
  <link rel="stylesheet" href="/styles.css" />
</head>
<body>
  <!-- ============ LOGIN ============ -->
  <div id="login" class="login" hidden>
    <form id="login-form" class="login-card">
      <div class="login-brand"><img class="brand-logo brand-logo--lg" src="/assets/logo.png" alt="" onerror="this.remove()" /> Ai&nbsp;Mini-Mart</div>
      <div class="login-sub">Staff &amp; POS sign-in</div>
      <label>Username<input name="username" autocomplete="username" required /></label>
      <label>Password<input name="password" type="password" autocomplete="current-password" required /></label>
      <button type="submit" class="btn btn-primary btn-block">Sign in</button>
      <p id="login-error" class="error" hidden></p>
    </form>
  </div>

  <!-- ============ APP SHELL ============ -->
  <div id="app" class="app" hidden>
    <header class="topbar">
      <button id="nav-toggle" class="icon-btn" aria-label="Menu">☰</button>
      <div class="brand"><img class="brand-logo" src="/assets/logo.png" alt="" onerror="this.remove()" /> Ai Mini-Mart <span class="brand-tag">Staff</span></div>
      <div class="spacer"></div>
      <div id="whoami" class="whoami"></div>
    </header>

    <div class="layout">
      <nav id="sidenav" class="sidenav">
        <a data-route="pos" class="navlink" data-perm="bills:create" title="Make Bill"><span class="ico">🧾</span><span class="lbl">Make Bill</span></a>
        <a data-route="products" class="navlink" data-perm="products:read" title="Products"><span class="ico">📦</span><span class="lbl">Products</span></a>
        <a data-route="categories" class="navlink" data-perm="categories:manage" title="Categories"><span class="ico">🏷️</span><span class="lbl">Categories</span></a>
        <a data-route="bills" class="navlink" data-perm="bills:read:own" title="Bill History"><span class="ico">🗂️</span><span class="lbl">Bill History</span></a>
        <a data-route="reports" class="navlink" data-perm="reports:read" title="Reports"><span class="ico">📊</span><span class="lbl">Reports</span></a>
        <a data-route="staff" class="navlink" data-perm="staff:manage" title="Staff"><span class="ico">👥</span><span class="lbl">Staff</span></a>
        <a data-route="printers" class="navlink" data-perm="printers:read" title="Printer"><span class="ico">🖨️</span><span class="lbl">Printer</span></a>
        <div class="nav-spacer"></div>
        <a id="view-store" class="navlink" target="_blank" rel="noopener" title="Open the customer storefront"><span class="ico">🏪</span><span class="lbl">View store</span></a>
        <button id="logout" class="navlink nav-logout" title="Sign out"><span class="ico">🚪</span><span class="lbl">Sign out</span></button>
      </nav>
      <main id="view" class="view"></main>
    </div>
  </div>

  <!-- ============ MODAL + TOAST ============ -->
  <div id="modal-root" class="modal-root" hidden>
    <div class="modal-backdrop" data-close></div>
    <div class="modal" role="dialog" aria-modal="true">
      <div class="modal-head">
        <h3 id="modal-title"></h3>
        <button class="icon-btn" data-close aria-label="Close">✕</button>
      </div>
      <div id="modal-body" class="modal-body"></div>
    </div>
  </div>
  <div id="toast" class="toast" hidden></div>

  <script src="/config.js"></script>
  <script src="/js/api.js"></script>
  <script src="/js/app.js"></script>
</body>
</html>
