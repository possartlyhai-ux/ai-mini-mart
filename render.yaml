# Render Blueprint — deploys the Ai Mini-Mart backend (Express API + admin/POS)
# as a free web service. The DATABASE is an external Neon Postgres (free,
# non-expiring) — NOT a Render-managed DB — so there is no 30-day clock.
#
# Setup:
#   1. Create a free project at neon.tech, copy its Postgres connection string.
#   2. Connect this repo in Render (New > Blueprint). Render reads this file,
#      auto-generates JWT_SECRET, and prompts for the unset vars.
#   3. Paste the Neon string into DATABASE_URL (Render env, sync:false below).
#      Use the POOLED connection string and append ?sslmode=require.
#   4. After deploy, note the service URL (e.g. https://ai-mini-mart-api.onrender.com),
#      put it in js/store-api.js (STORE_API_BASE), deploy the storefront, then set
#      CORS_ORIGIN to the storefront URL and redeploy.
#
# Notes: free Render web services cold-start after idle. Uploaded images
# (uploads/) are EPHEMERAL on free instances — they reset on redeploy. Add a
# persistent disk or object storage for durable uploads.

services:
  - type: web
    name: ai-mini-mart-api
    runtime: node
    plan: free
    rootDir: backend
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /api/health
    autoDeploy: true
    envVars:
      - key: DATABASE_URL
        sync: false # paste the Neon pooled connection string (?sslmode=require)
      - key: JWT_SECRET
        generateValue: true
      - key: CORS_ORIGIN
        sync: false # set to the storefront URL after the storefront is deployed
      - key: NODE_VERSION
        value: "20"
